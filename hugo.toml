baseURL = "https://geeklandlinux.github.io/"
languageCode = "es-es"
title = "Geekland"
theme = "PaperMod"
defaultContentLanguage = "es"
enableEmoji = true

# Habilita la generación del índice JSON requerido para la búsqueda de PaperMod
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "Blog sobre tecnología, Linux, privacidad y software libre"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  env = "production"

# Icono de RSS en el pie de página
[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

# Icono del sitio / Favicon para navegadores
[params.assets]
  favicon = "/favicon.ico"
  favicon16x16 = "/favicon.ico"
  favicon32x32 = "/favicon.ico"

# Etiqueta de la barra de navegación superior (Logo)
[params.label]
  text = "Geekland"
  icon = "/favicon.ico"

# Iconos sociales (Aparecen abajo en el pie o en el profileMode)
[params.socialIcons]
  name = "rss"
  url = "/index.xml"

# Para permitir renderizado de html en formulario de contacto
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Menú Principal
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Artículos"
    url = "/posts/"
    weight = 1

  [[menu.main]]
    identifier = "categories"
    name = "Categorías"
    url = "/categories/"
    weight = 2

  [[menu.main]]
    identifier = "search"
    name = "Buscar"
    url = "/search/"
    weight = 3

  [[menu.main]]
    identifier = "contacto"
    name = "Contacto"
    url = "/pages/contacto/"
    weight = 4
